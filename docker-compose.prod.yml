# circle_be 测试环境部署编排 —— 核心后端栈(阶段4)。
#
#   postgres + redis + minio(+ 建桶)+ 一次性 migrate + circle_be
#
# OpenIM(阶段5)用官方 openim-docker 单独编排;LiveKit(阶段6)用 LiveKit Cloud。
# 完整步骤见 DEPLOY.md。
#
# compose 变量插值从同目录 .env 读(DB_PASSWORD / REDIS_PASSWORD / MinIO 密钥)。
# 应用配置从挂载的 .env.production 读(见 .env.production.example)。
# 两者的 DB / Redis 密码、MinIO 密钥必须一致 —— gen-env 会自动保持一致。

name: circle-be

# 容器日志默认无上限,写满磁盘会连带整台宿主机一起挂;每个服务都必须带轮转。
# 10m × 3 ≈ 每服务最多 30MB。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: circle
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: circle
    # shared_buffers 等默认值按小实例设定;留足余量给连接与 WAL。
    mem_limit: 1g
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U circle -d circle']
      interval: 5s
      timeout: 5s
      retries: 12
    # 仅供容器内访问,不对公网暴露端口

  redis:
    image: redis:7-alpine
    profiles: ['bundled-redis']
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - test -n "$$REDIS_PASSWORD" || { echo 'REDIS_PASSWORD is required for bundled Redis' >&2; exit 1; }; exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD" --maxmemory 512mb --maxmemory-policy noeviction
    mem_limit: 768m
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG
      interval: 5s
      timeout: 3s
      retries: 12
    # 仅供 compose 内网访问,不向宿主机发布 6379

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1g
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    command: server /data --console-address ":9001"
    ports:
      # 控制台只绑回环:用 SSH 隧道访问(ssh -L 9001:localhost:9001 ...)。
      # 不要发布到 0.0.0.0 —— Docker 发布端口走 DOCKER 链、先于 iptables INPUT,
      # 主机防火墙 INPUT 规则挡不住,会把管理后台直接暴露公网。
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 12

  # 一次性:确保 bucket 存在；最小公开读策略由应用启动时安装。
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    logging: *default-logging
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set}
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/circle &&
      echo 'minio bucket [circle] ready'
      "
    restart: 'no'

  # 一次性:应用 Prisma 迁移建表,然后退出。
  # 使用锁文件构建阶段中的 Prisma CLI，部署不依赖运行时从 npm 下载。
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: build-stage
    working_dir: /app
    logging: *default-logging
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      # prisma CLI 从环境变量读 DATABASE_URL(schema.prisma datasource url=env(...))
      DATABASE_URL: 'postgresql://circle:${DB_PASSWORD:?set}@postgres:5432/circle?schema=public'
    command: npx prisma migrate deploy
    restart: 'no'

  circle_be:
    container_name: circle-be-blue
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    logging: *default-logging
    # Node 默认堆上限按宿主机内存推算,容器里会算得过大;留出堆外内存余量。
    mem_limit: 1g
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy, required: false }
      migrate: { condition: service_completed_successfully }
      minio-init: { condition: service_completed_successfully }
    environment:
      NODE_ENV: production
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      # getServerConfig 读这个文件;只读挂载
      - ./.env.production:/app/.env.production:ro
    expose:
      - '3000'
    healthcheck:
      # 用 node 自带能力探活(slim 镜像没有 curl/wget)。
      # /readyz 真查数据库,且只认 2xx —— 之前探 /api/v1/outbox/health 并放行
      # statusCode<500,那条路由挂着 JwtGuard,永远 401,于是「进程还在」就等于
      # 「健康」:数据库断了照样绿灯,蓝绿发版的健康门禁也形同虚设。
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/readyz',r=>process.exit(r.statusCode>=200&&r.statusCode<300?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  admin_web:
    build:
      context: ../circle_admin_web
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    depends_on:
      # required: false —— 蓝绿发版后 circle_be(蓝)可能整个被移除、由
      # circle_be_green 在服务;日常 `up -d` 不应因此失败或把停用色拉起来。
      circle_be: { condition: service_healthy, required: false }
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    entrypoint: ['/bin/sh', '/usr/local/bin/caddy-entrypoint.sh']
    depends_on:
      # required: false 的理由同 admin_web —— 在役颜色可能是 circle_be_green。
      circle_be: { condition: service_healthy, required: false }
      admin_web: { condition: service_started, required: false }
    # OpenIM 用官方 openim-docker 独立编排，不在本 compose 的网络里，网关跑在宿主机。
    # 容器里的 127.0.0.1 是容器自己 —— 要回宿主机只能走 host-gateway。
    # （OpenIM 若挪到别的主机，用 OPENIM_WS_UPSTREAM/OPENIM_API_UPSTREAM 覆盖成其内网地址。）
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?set ADMIN_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
      OPENIM_WS_UPSTREAM: ${OPENIM_WS_UPSTREAM:-host.docker.internal:10001}
      OPENIM_API_UPSTREAM: ${OPENIM_API_UPSTREAM:-host.docker.internal:10002}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile.admin:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy-entrypoint.sh:/usr/local/bin/caddy-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
