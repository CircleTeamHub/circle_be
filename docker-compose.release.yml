services:
  migrate:
    image: ${CIRCLE_BE_IMAGE:?export CIRCLE_BE_IMAGE, e.g. via deploy/release-deploy.sh}
    environment:
      HOME: /tmp
      CHECKPOINT_DISABLE: "1"

  circle_be:
    image: ${CIRCLE_BE_IMAGE:?export CIRCLE_BE_IMAGE, e.g. via deploy/release-deploy.sh}

  circle_be_green:
    extends:
      file: docker-compose.prod.yml
      service: circle_be
    image: ${CIRCLE_BE_IMAGE:?export CIRCLE_BE_IMAGE, e.g. via deploy/release-deploy.sh}
