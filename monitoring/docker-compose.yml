# Local observability stack for circle_be.
#
# Scrapes the backend /metrics endpoint + host/container metrics, visualizes in
# Grafana, and routes alerts via Alertmanager.
#
# Run:  docker compose -f monitoring/docker-compose.yml up -d
# Stop: docker compose -f monitoring/docker-compose.yml down
#
# Images are :latest for an easy local start — pin explicit versions for prod.

# #107：容器日志默认无上限，写满磁盘会连带 pg_data 所在宿主机一起挂。
# 与 docker-compose.prod.yml 同款轮转 + 内存上限。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: circle-prometheus
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    # Lets Prometheus reach the backend running on the HOST (npm run start:dev).
    # Works on Docker Desktop; extra_hosts makes it work on Linux too.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '127.0.0.1:9090:9090'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: circle-node-exporter
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    command:
      - '--path.rootfs=/host'
    volumes:
      # Plain :ro (no rslave) — Docker Desktop for Mac rejects slave propagation
      # on "/". On a Linux server you may prefer "/:/host:ro,rslave".
      - '/:/host:ro'
    # No host port — Prometheus scrapes it over the compose network (node-exporter:9100).
    # NOTE on macOS: this measures the Docker Desktop Linux VM, not macOS itself.
    # On a real Linux server it measures the host. Good enough to test the pipeline.

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: circle-cadvisor
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    privileged: true
    volumes:
      - '/:/rootfs:ro'
      - '/var/run:/var/run:ro'
      - '/sys:/sys:ro'
      - '/var/lib/docker/:/var/lib/docker:ro'
    # No host port — scraped internally as cadvisor:8080.
    # NOTE: cAdvisor can be flaky on Docker Desktop for Mac. If it crash-loops,
    # comment this service out + its scrape job — the rest of the stack is fine.

  alertmanager:
    image: prom/alertmanager:latest
    container_name: circle-alertmanager
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    volumes:
      # Mount the whole dir so alertmanager.yml can read the gitignored discord.url.
      - ./alertmanager:/etc/alertmanager:ro
    ports:
      - '127.0.0.1:9093:9093'

  grafana:
    image: grafana/grafana:latest
    container_name: circle-grafana
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      # Deliberately no default: `:?` makes compose refuse to start rather than
      # boot Grafana on a guessable password. Set it in monitoring/.env
      # (copy monitoring/.env.example) — that file is gitignored.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in monitoring/.env — see monitoring/README.md}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '127.0.0.1:3001:3000' # host 3001 → avoids clash with the backend on 3000
    depends_on:
      - prometheus

  # Uptime monitoring — pings endpoints and alerts when something is DOWN
  # (the gap Prometheus can't cover: "is the service even reachable?"). Monitors
  # + Discord notifications are configured in its own web UI (data in a volume).
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: circle-uptime-kuma
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      # Bind to localhost so the first-run admin setup is not claimable from LAN.
      - '127.0.0.1:3002:3001' # Uptime-Kuma listens on 3001 in-container → host 3002

volumes:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
