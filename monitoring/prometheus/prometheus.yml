global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The circle_be backend running on the host. Restart the backend on the new
  # code first, or this target shows DOWN (old build has no /metrics).
  - job_name: circle-be
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # OpenIM exposes its own Prometheus metrics when enabled in its config (#110).
  # 端口因版本而异 —— 先在服务器上确认（deploy/openim-hardening-runbook.md 第 7 步：
  #   grep -rn "prometheusPort" ~/openim-docker/config），把下面的占位端口换成真实值
  # 再 reload prometheus。目标不可达时 Prometheus 只标记 target down，不影响其它 job。
  # - job_name: openim
  #   static_configs:
  #     # msggateway（连接数/在线数——容量规划最需要的那组）
  #     - targets: ["host.docker.internal:20112"]
  #     # openim-api（消息吞吐）
  #     - targets: ["host.docker.internal:20113"]
