global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The circle_be backend running on the host. Restart the backend on the new
  # code first, or this target shows DOWN (old build has no /metrics).
  - job_name: circle-be
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # OpenIM exposes its own Prometheus metrics when enabled in its config.
  # Uncomment + set the correct port once verified for your OpenIM version.
  # - job_name: openim
  #   static_configs:
  #     - targets: ["host.docker.internal:<openim-metrics-port>"]
