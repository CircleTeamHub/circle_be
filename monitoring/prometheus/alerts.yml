groups:
  - name: circle-be
    rules:
      - alert: BackendHigh5xx
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            / sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend 5xx error ratio > 5% for 2m"

      - alert: BackendHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend p95 latency > 1s for 5m"

      # Event-loop lag is the signal unique to a single-threaded Node process:
      # requests can still return 200 while the loop is blocked, so this fires
      # before latency/5xx alerts do. Metric comes free from prom-client's
      # collectDefaultMetrics (see src/metrics/metrics.service.ts).
      - alert: BackendEventLoopLag
        expr: nodejs_eventloop_lag_p99_seconds{job="circle-be"} > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend event-loop lag p99 > 250ms for 5m (process is blocking)"

      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target {{ $labels.job }} is down"

      # Companion to TargetDown, and NOT redundant with it. In production the
      # circle-be job is DNS service discovery over the blue/green container
      # names (prometheus.prod.yml): if no colour is running, discovery returns
      # zero targets, so `up{job="circle-be"}` stops existing rather than going
      # to 0 — and `up == 0` above can never fire. This catches exactly that
      # hole: a backend that is not merely broken but entirely absent.
      #
      # Harmless in dev, where the job is a static target and `up` always exists.
      # 5m tolerates a blue-green switch, which briefly runs both colours and
      # then removes one; it never leaves zero.
      - alert: CircleBeNoTarget
        expr: absent(up{job="circle-be"})
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No circle-be scrape target exists (no backend container is running)"

  - name: host
    rules:
      - alert: HighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage > 85% for 5m"

      # #87：私有笔记媒体的桶策略未确认应用 —— notes/* 可能匿名可读。
      # /readyz 有意不因此变红（策略失败在所有副本相同，fail-closed = 全站故障），
      # 这条告警是唯一的叫醒机制。
      - alert: ObjectStorePolicyUnconfirmed
        expr: max(circle_object_store_policy_unconfirmed) == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Private-media bucket policy unconfirmed — notes/* may be anonymously readable"

      # #102：会话撤销 fail-open 依赖 Redis。Redis 挂掉期间登出/封禁/盗号撤销
      # 全部静默失效（HTTP 与 WS 同步失效），必须有人处理。
      - alert: RedisDown
        # round 2 review：min 而不是 max —— 蓝绿切换/单色坏配置时，只要有
        # 一个仍在服务的实例丢了 Redis（撤销 fail-open），就必须响。
        expr: min(circle_redis_up) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down — session revocation is silently fail-open while this fires"
