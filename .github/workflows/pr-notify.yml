name: PR Notify

on:
  pull_request:
    types:
      - opened
      - closed

permissions:
  contents: read

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    # Notify when a PR is opened, and when it is merged (closed + merged).
    # Plain closes (closed without merge) are intentionally skipped.
    if: ${{ github.event.action == 'opened' || github.event.pull_request.merged == true }}
    timeout-minutes: 5
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Send Discord Notification
        # Secrets are unavailable for PRs from forks; skip instead of failing.
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        # Pass user-controlled fields via env (never interpolate into the
        # script body) to avoid shell/code injection from PR titles or branches.
        env:
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          node <<'NODE' > payload.json
          const isMerged =
            process.env.PR_ACTION === 'closed' && process.env.PR_MERGED === 'true';

          const embed = {
            author: {
              name: isMerged ? '✅ Pull request merged' : '🆕 Pull request opened',
            },
            title: `#${process.env.PR_NUMBER} ${process.env.PR_TITLE}`.slice(0, 256),
            url: process.env.PR_URL,
            // GitHub colors: open = green (#1a7f37), merged = purple (#8250df).
            color: isMerged ? 0x8250df : 0x1a7f37,
            fields: [
              {
                name: 'Repository',
                value: process.env.GITHUB_REPOSITORY,
                inline: true,
              },
              {
                name: isMerged ? 'Merged by' : 'Author',
                value: isMerged ? process.env.PR_MERGED_BY : process.env.PR_AUTHOR,
                inline: true,
              },
              {
                name: 'Branch',
                value: `\`${process.env.PR_BASE}\` ← \`${process.env.PR_HEAD}\``,
                inline: false,
              },
            ],
            timestamp: isMerged ? process.env.PR_MERGED_AT : process.env.PR_CREATED_AT,
            footer: { text: 'GitHub Actions' },
          };

          const payload = {
            username: 'GitHub Actions',
            embeds: [embed],
          };

          process.stdout.write(JSON.stringify(payload));
          NODE

          curl --fail-with-body \
            -H 'Content-Type: application/json' \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"
