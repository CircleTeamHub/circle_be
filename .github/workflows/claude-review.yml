# AI code review — Claude reads each PR diff and comments on bugs, security, and
# logic issues a pattern scanner can't catch.
#
# SETUP (one-time): add an Anthropic API key as a repo secret named
# ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions). Until then the
# review step is skipped (the job still passes — no red X). Billed per run by
# token usage on your Anthropic account.

name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel an in-progress review when the PR is updated again — saves a runner and
# Anthropic tokens on rapid pushes.
concurrency:
  group: claude-review-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    name: "Claude PR review"
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Detect API key
        id: key
        run: echo "present=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.key.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        if: steps.key.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this NestJS + Prisma backend PR. Prioritise real defects over
            style. Focus on:
            1. Bugs & logic errors — edge cases, wrong conditions, off-by-one,
               unhandled async/await, broken error handling.
            2. Security — authz/authn gaps, missing input validation, injection,
               leaking data across users/tenants, unsafe dynamic access.
            3. Data integrity — Prisma queries, transactions, race conditions,
               migration safety.
            4. Tests — meaningful coverage for the new behaviour.

            Leave inline comments on specific lines; use a top-level comment for
            the summary. Be concrete and skip nitpicks.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
