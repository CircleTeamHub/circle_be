# Enforce Conventional-Commit PR titles so history stays consistent and a
# changelog can be generated from merge commits later.

name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    name: "Conventional PR title"
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            chore
            perf
            ci
            build
            style
            revert
