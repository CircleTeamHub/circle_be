# pgBackRest configuration — NON-SECRET settings only.
#
# Every credential (S3 key/secret, repo cipher passphrase) is injected as a
# PGBACKREST_* environment variable by deploy/backup/lib.sh from .env.backup.
# Nothing secret belongs in this file: it is committed to the repo and mounted
# read-only into both the postgres container (for archive-push) and the backup
# container (for backup/restore/expire).
#
# Mounted at /etc/pgbackrest/pgbackrest.conf in both containers.

[global]
repo1-type=s3
repo1-path=/pgbackrest
# Path-style addressing works for both Cloudflare R2 and MinIO; AWS S3 accepts
# it too. Virtual-hosted style would need per-provider endpoint juggling.
repo1-s3-uri-style=path

# Encryption at rest for the whole repo, applied client-side before upload.
# The destination operator never sees plaintext. Passphrase comes from
# BACKUP_PG_CIPHER_PASS. NOTE: this is necessarily symmetric — pgBackRest must
# read the repo to build incrementals — so this host CAN decrypt its own
# Postgres repo. The Mongo dump path uses asymmetric age encryption instead and
# does not have this property. docs/backups.md spells out the difference.
repo1-cipher-type=aes-256-cbc

# Retention is enforced by `pgbackrest expire` ONLY. Do not add a bucket
# lifecycle rule over the /pgbackrest prefix: lifecycle deletes objects without
# updating the repo manifest and will silently corrupt the backup set.
repo1-retention-full-type=count

compress-type=zst
compress-level=6
process-max=2

# Logs go to stdout so `docker compose logs` is the single place to look.
log-level-console=detail
log-level-file=off

# Take the checkpoint immediately rather than waiting for the next scheduled
# one — bounds how long a backup takes to start.
start-fast=y
# Only copy files whose checksum changed; makes daily incrementals cheap.
delta=y

[circle]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
# The backup container reaches the postmaster over the shared unix socket
# volume (pg_socket) rather than TCP: pgBackRest's pg1-host means "remote
# pgbackrest over SSH/TLS", which is not what a same-host sidecar wants.
pg1-socket-path=/var/run/postgresql
